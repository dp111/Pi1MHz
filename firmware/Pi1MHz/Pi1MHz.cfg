# Pi1MHz.cfg - Pi1MHz configuration
#
# This file lives in the /Pi1MHz directory on the SD card (next to the
# ROMs and defscsi.cfg) and is read once at start-up. Uncomment and edit
# the lines you need. Rules:
#   - one key per line; the key must start at the beginning of the line
#   - "key=value" or "key value"; the value is the rest of the line and
#     may contain spaces
#   - '#' starts a comment (whole line, or after a value)
#   - a key with no value (a bare flag) counts as "set"
#
# Note: disk_led_gpio and baud_rate are read before the SD card is
# available, so those two still go in cmdline.txt - everything else
# belongs here. Values shown after '=' are the defaults.

# ---- core -----------------------------------------------------------------
# Pi1MHznOE=1              # board has an external nOE pin
#
# Per-emulator overrides: "<name>_addr=0xNN" relocates an emulator's FRED
# base address; "<name>_addr=-1" disables it. Every emulator is listed below
# with its default address (0x00 = not address-mapped; use -1 only to
# disable those). Uncomment to change.
# Helpers_addr=0x88
# Rampage_addr=0xFD
# Rambyte_addr=0x00
# Harddisc_addr=0x40
# M5000_addr=0x00
# Discaccess_addr=0xA6
# Videoplayer_addr=0x00
# Framebuffer_addr=0xA0
# Mouseredirect_addr=0xAC
# usb_addr=0x00
# wifi_addr=0x00
# aun_addr=0x00
# Teletext_addr=0x10

# ---- BeebSCSI hard disc ---------------------------------------------------
# SCSIJUKE=0               # initial SCSI LUN jukebox directory
# SCSIID=0                 # SCSI ID
# VFSJUKE=0                # VFS jukebox directory

# ---- Music 5000 ----------------------------------------------------------
# M5000_BeebAudio_Off=1    # disable the Beeb's own audio passthrough
# M5000_Gain=100           # output gain (percent)

# ---- WiFi (only starts when wifi_ssid is set) -----------------------------
# wifi_ssid=MyNetwork      # network to join (alias: SSID)
# wifi_password=secret     # network password (alias: SSIDpassword)
# wifi_hostname=Pi1MHz     # mDNS / network name
# wifi_country=GB          # CYW43 regulatory domain (ISO 3166, e.g. US, DE)
# wifi_ip=dhcp             # "dhcp" or "static"
# static_ip=192.168.1.50   # IPv4 address when using static addressing
# wifi_netmask=255.255.255.0
# wifi_gateway=192.168.1.1
# wifi_dns=192.168.1.1
# wifi_http_port=80        # built-in web server port
# wifi_debug=1             # verbose WiFi/lwIP logging
# --- WiFi advanced / diagnostics (rarely needed) ---
# wifi_emulator=1          # lenient firmware-boot fallback (test rigs only)
# wifi_sdio_host=...       # override the SDIO host backend name
# wifi_sdio_probe=1        # enable extra SDIO probing
# wifi_sdio_tx_probe=1     # enable SDIO TX probing
# wifi_sdio_tx_probe_command=version  # version|magic|up|infra|auth|ssid|
#                                     # wpa_auth|wsec|pmk|join
# wifi_sdio_rx_sweep_limit=16

# ---- WebDAV (SD-card file access over HTTP) -------------------------------
# Digest authentication is enforced on every route only when BOTH a user
# and a password are set; otherwise the web/WebDAV server is unauthenticated.
# webdav_user=admin
# webdav_password=secret
# webdav_realm=Pi1MHz      # authentication realm shown to the client

# ---- AUN / Econet (AUNFS) -------------------------------------------------
# aun_station=0.42         # our station as net.stn (or "ip" / "ip.ip")
# aun_port=32768           # local AUN UDP listen port
# aun_map=1.254=192.168.1.10,1.200=192.168.1.11:32769
# aun_learn=2              # learn-mode network number
# aun_machine=0100013C     # 4 machine-peek reply bytes (hex)
# aun_debug=1              # log AUN events on the wifi debug channel

# ---- Teletext adapter (&FC10) ---------------------------------------------
# teletext_server1=a.b.c.d:port   # CEEFAX channel 0 t42 TCP source
# teletext_server2=a.b.c.d:port   # channel 1
# teletext_server3=a.b.c.d:port   # channel 2
# teletext_server4=a.b.c.d:port   # channel 3 (port optional, default 19761)
# teletext_debug=1                # log teletext events
